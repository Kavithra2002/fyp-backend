name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: fypdb_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -ptest"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      MYSQL_HOST: localhost
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: test
      MYSQL_DATABASE: fypdb_test
      JWT_SECRET: ci-test-jwt-secret-min-24-chars
      ML_SERVICE_URL: ""
      ALLOW_PUBLIC_REGISTRATION: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
